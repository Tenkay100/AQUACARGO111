<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Aqua Cargo</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/animations.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, rgba(12, 141, 216, 0.15) 0%, transparent 40%),
                radial-gradient(circle at bottom left, rgba(3, 232, 164, 0.1) 0%, transparent 40%),
                var(--bg-main);
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            text-align: center;
        }

        .login-logo {
            justify-content: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .login-logo svg {
            width: 40px;
            height: 40px;
        }

        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: -5px;
            margin-bottom: 25px;
        }

        .error-message {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(255, 77, 77, 0.3);
        }
    </style>
</head>

<body>

    <div class="glass-panel login-card fade-in-up">
        <a href="index.html" class="brand-logo login-logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M21 16.5C21 16.88 20.79 17.21 20.47 17.38L12.5 21.82C12.18 22.06 11.82 22.06 11.5 21.82L3.53 17.38C3.21 17.21 3 16.88 3 16.5V7.5C3 7.12 3.21 6.79 3.53 6.62L11.5 2.18C11.82 1.94 12.18 1.94 12.5 2.18L20.47 6.62C20.79 6.79 21 7.12 21 7.5V16.5ZM12 4.15L5.4 7.82L12 11.49L18.6 7.82L12 4.15ZM4.5 9.4L4.5 15.66L11.25 19.42L11.25 13.16L4.5 9.4ZM12.75 19.42L19.5 15.66L19.5 9.4L12.75 13.16L12.75 19.42Z" />
            </svg>
            Aqua Cargo
        </a>

        <h2 style="margin-bottom: 5px;">Admin Portal Log In</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Enter your credentials to access the dashboard</p>

        <div class="error-message" id="error-message">Invalid Username or Password</div>

        <form id="login-form">
            <div class="form-group" style="text-align: left;">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" required
                    value="admin">
            </div>
            <div class="form-group" style="text-align: left; margin-bottom: 10px;">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" required
                    value="AquaCargo2026!">
            </div>

            <a href="#" class="forgot-pass">Forgot Password?</a>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 14px; font-size: 1.1rem; margin-bottom: 20px;">Secure Login</button>
        </form>



        <a href="index.html"
            style="display: inline-block; margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">← Back to
            Homepage</a>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const err = document.getElementById('error-message');

            if (user === 'admin' && pass === 'AquaCargo2026!') {
                // Set fake session token
                sessionStorage.setItem('aqua_admin_token', 'demo-valid-token-1234');
                window.location.href = 'admin-dashboard.html';
            } else {
                err.style.display = 'block';
                // Shake animation code missing but simple to simulate
                const card = document.querySelector('.login-card');
                card.style.transform = 'translateX(-10px)';
                setTimeout(() => card.style.transform = 'translateX(10px)', 100);
                setTimeout(() => card.style.transform = 'translateX(-10px)', 200);
                setTimeout(() => card.style.transform = 'translateX(0)', 300);
            }
        });
    </script>
</body>

</html>
